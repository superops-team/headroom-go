linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - unconvert
    - prealloc
    - bodyclose
  disable-all: false

run:
  timeout: 5m
  tests: true

issues:
  exclude-dirs:
    - testdata
  max-issues-per-linter: 0
  max-same-issues: 0

name: Release
on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
          - os: macos-latest
            goos: darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Build amd64
        run: |
          GOOS=${{ matrix.goos }} GOARCH=amd64 CGO_ENABLED=0 \
            go build -ldflags="-s -w" -o headroom-${{ matrix.goos }}-amd64 ./cmd/headroom/
      - name: Build arm64
        run: |
          GOOS=${{ matrix.goos }} GOARCH=arm64 CGO_ENABLED=0 \
            go build -ldflags="-s -w" -o headroom-${{ matrix.goos }}-arm64 ./cmd/headroom/
      - uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}
          path: headroom-${{ matrix.goos }}-*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
      - name: Prepare release assets
        run: |
          mkdir -p dist
          find . -name 'headroom-*' -type f -exec cp {} dist/ \;
          cd dist && sha256sum * > checksums.txt
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  docker:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - uses: docker/build-push-action@v6
        with:
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          platforms: linux/amd64,linux/arm64

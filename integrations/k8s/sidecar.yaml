apiVersion: apps/v1
kind: Deployment
metadata:
  name: headroom-sidecar-demo
  labels:
    app: headroom-sidecar
spec:
  replicas: 1
  selector:
    matchLabels:
      app: headroom-sidecar
  template:
    metadata:
      labels:
        app: headroom-sidecar
    spec:
      containers:
      # 主应用容器
      - name: app
        image: your-llm-app:latest
        env:
        - name: OPENAI_BASE_URL
          value: http://localhost:18787/v1
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: llm-api-key
              key: api-key
        ports:
        - containerPort: 8080

      # headroom sidecar
      - name: headroom
        image: ghcr.io/superops-team/headroom-go:latest
        args:
        - proxy
        - --port=18787
        - --aggressiveness=0.5
        env:
        - name: HEADROOM_API_KEY
          valueFrom:
            secretKeyRef:
              name: llm-api-key
              key: api-key
        ports:
        - containerPort: 18787
        resources:
          limits:
            memory: 64Mi
            cpu: 100m
          requests:
            memory: 16Mi
            cpu: 10m
        readinessProbe:
          httpGet:
            path: /healthz
            port: 18787
          initialDelaySeconds: 1
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: headroom-sidecar-demo
spec:
  selector:
    app: headroom-sidecar
  ports:
  - port: 8080
    targetPort: 8080
